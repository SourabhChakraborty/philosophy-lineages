  { s:"kierkegaard",  t:"sartre",       concept:"Subjective truth / anxiety",     detail:"Sartre's radical freedom and existential 'nausea' inherit Kierkegaard's insistence on inward, subjective certainty over the System." },
  { s:"nietzsche",    t:"heidegger",    concept:"Destruction of metaphysics",     detail:"Heidegger's Destruktion of the Western tradition directly continues Nietzsche's genealogical critique of Platonism and Christian morality." },
  { s:"nietzsche",    t:"sartre",       concept:"Values as created",              detail:"Sartre's 'existence precedes essence' echoes Nietzsche's insistence that values are made, not discovered — the self is always a project." },
  { s:"nietzsche",    t:"foucault",     concept:"Genealogy / power–knowledge",    detail:"Foucault's genealogical method is explicitly Nietzschean: expose the power interests concealed in claims to truth, normality, or health." },
  { s:"nietzsche",    t:"derrida",      concept:"Perspectivism / trace",          detail:"Derrida's différance — meaning always deferred, never fully present — echoes Nietzsche's perspectivism: there is no unmediated access to truth." },
  { s:"frege",        t:"russell",      concept:"Mathematical logic",             detail:"Russell builds on Frege's predicate logic; he discovers the set-theoretic paradox that forces a revision of Frege's original system." },
  { s:"frege",        t:"wittgenstein", concept:"Language and logic",             detail:"Wittgenstein inherits Frege's anti-psychologism and the view that logical structure determines meaning — then radically rethinks both." },
  { s:"james",        t:"bergson",      concept:"Stream of consciousness",        detail:"James's stream of consciousness and radical empiricism directly parallel Bergson's durée; each challenges the atomistic picture of mind and time." },
  { s:"bergson",      t:"merleauponty", concept:"Duration / lived time",          detail:"Merleau-Ponty's lived body inhabits Bergsonian duration: time is not a series of instants but a flowing, embodied continuity." },
  { s:"husserl",      t:"heidegger",    concept:"Phenomenological method",        detail:"Heidegger was Husserl's student and assistant. He transforms phenomenology from a transcendental science of consciousness into an ontology of Being." },
  { s:"husserl",      t:"sartre",       concept:"Intentionality / epoché",        detail:"Sartre imports Husserl's intentionality — consciousness is always of something — and uses it to argue consciousness is pure negativity." },
  { s:"husserl",      t:"merleauponty", concept:"Phenomenology / lifeworld",      detail:"Merleau-Ponty radicalises Husserl's late concept of the lifeworld by situating it in the body, dissolving the transcendental ego." },
  { s:"russell",      t:"wittgenstein", concept:"Logical atomism (transformed)",  detail:"The Tractatus refines and then implodes Russell's logical atomism: language pictures facts, but what makes picturing possible cannot be said." },
  { s:"heidegger",    t:"sartre",       concept:"Facticity / situated existence", detail:"Sartre's 'situation' and his being-for-itself / being-in-itself distinction derive directly from Heidegger's account of Dasein's thrownness." },
  { s:"heidegger",    t:"beauvoir",     concept:"Situated freedom / facticity",   detail:"Beauvoir argues freedom is always embodied and situated — a critique of both Sartre and Heidegger's tendency to treat the body as merely instrumental." },
  { s:"heidegger",    t:"merleauponty", concept:"Being-in-the-world",             detail:"Merleau-Ponty inherits being-in-the-world but relocates it from existential structure to the lived body, giving primacy to embodied perception." },
  { s:"heidegger",    t:"derrida",      concept:"Destruktion / trace",            detail:"Derrida radicalises Heidegger's Destruktion: there is no origin or presence, only the trace of a Being that has always already withdrawn." },
  { s:"heidegger",    t:"arendt",       concept:"Existence and action",           detail:"Arendt was Heidegger's student. She redirects his analysis of Dasein's singularity toward political plurality — we exist as many, not as one." },
  { s:"sartre",       t:"beauvoir",     concept:"Radical freedom (critiqued)",    detail:"Beauvoir adopts Sartre's radical freedom but critiques its abstraction: without material and social conditions, the concept of freedom is empty." },
  { s:"merleauponty", t:"beauvoir",     concept:"Embodied subjectivity",          detail:"Beauvoir's account of woman's situation as a lived body — neither pure thing nor pure consciousness — is enriched by Merleau-Ponty's phenomenology." },
  { s:"wittgenstein", t:"foucault",     concept:"Language games / discourse",     detail:"Foucault's 'discursive formations' echo Wittgenstein's language games: what counts as meaningful or true is constituted by rule-governed practices." },
];

// ─── SETUP ───────────────────────────────────────────────────────────────────
const svg  = d3.select("#graph");
const cont = document.getElementById("graph-container");
let W = cont.clientWidth, H = cont.clientHeight;
const root = svg.append("g");
const zoom = d3.zoom().scaleExtent([0.25, 4])
  .on("zoom", e => root.attr("transform", e.transform));
svg.call(zoom);

function colX(col) {
  if (col === 0) return W * 0.055;
  return W * (0.13 + (col - 1) / 7 * 0.855);
}

// ─── ERA BANDS ───────────────────────────────────────────────────────────────
const eraG = root.append("g");
function drawBands() {
  eraG.selectAll("*").remove();
  const breakMid = (colX(0) + colX(1)) / 2;
  const bw = 28;
  COLS.forEach((col, i) => {
    let x0, x1;
    if (i === 0)                { x0 = 0;                           x1 = breakMid - bw/2; }
    else if (i === 1)           { x0 = breakMid + bw/2;             x1 = (colX(1)+colX(2))/2; }
    else if (i < COLS.length-1) { x0 = (colX(i-1)+colX(i))/2;      x1 = (colX(i)+colX(i+1))/2; }
    else                        { x0 = (colX(i-1)+colX(i))/2;       x1 = W; }

    eraG.append("rect").attr("x",x0).attr("y",0)
      .attr("width",x1-x0).attr("height",H).attr("fill",col.band);
    if (i > 0)
      eraG.append("line").attr("x1",x0).attr("y1",38).attr("x2",x0).attr("y2",H-20)
        .attr("stroke","#ccc8c0").attr("stroke-width",1).attr("stroke-dasharray","3,5");
    const lx = (x0+x1)/2;
    eraG.append("text").attr("class","era-label").attr("x",lx).attr("y",20)
      .attr("fill","#808098").text(col.name);
    eraG.append("text").attr("class","era-period").attr("x",lx).attr("y",31)
      .attr("fill","#a0a0b8").text(col.period);
  });
  // gap strip
  eraG.append("rect").attr("x",breakMid-bw/2).attr("y",0)
    .attr("width",bw).attr("height",H).attr("fill","#f5f2ed");
  eraG.append("text").attr("x",breakMid).attr("y",H/2)
    .attr("text-anchor","middle").attr("font-size","9px").attr("fill","#c8c0b8")
    .attr("transform",`rotate(-90,${breakMid},${H/2})`).text("~1800 year gap~");
}

// ─── ARROWHEADS ──────────────────────────────────────────────────────────────
const defs = svg.append("defs");
Object.entries(T).forEach(([name, {c}]) => {
  defs.append("marker")
    .attr("id", `arr_${name.replace(/[\s\-]/g,"_")}`)
    .attr("viewBox","0 -5 10 10").attr("refX",26).attr("refY",0)
    .attr("markerWidth",5).attr("markerHeight",5).attr("orient","auto")
    .append("path").attr("d","M0,-5L10,0L0,5")
    .attr("fill",c).attr("fill-opacity",.55);
});

// ─── STATIC LAYOUT ───────────────────────────────────────────────────────────
const links = INF.map(d => ({
  ...d,
  source: P.find(p => p.id === d.s),
  target: P.find(p => p.id === d.t),
}));

function computePositions() {
  const byCol = d3.group(P, d => d.col);
  byCol.forEach(members => {
    const n = members.length;
    const topPad = 52, botPad = 36;
    const spacing = (H - topPad - botPad) / (n + 1);
    members.forEach((p, i) => {
      p.x = colX(p.col);
      p.y = topPad + spacing * (i + 1);
    });
  });
}

// ─── LINKS ───────────────────────────────────────────────────────────────────
const linkG = root.append("g");
const linkSel = linkG.selectAll("path").data(links).join("path")
  .attr("class","influence-path")
  .attr("stroke", d => T[d.source.tradition]?.c || "#888")
  .attr("marker-end", d => `url(#arr_${d.source.tradition.replace(/[\s\-]/g,"_")})`);

const elabelG = root.append("g");
const elabels = elabelG.selectAll("text").data(links).join("text")
  .attr("class","edge-label").text(d => d.concept);

// ─── NODES ───────────────────────────────────────────────────────────────────
const KEY = new Set(["plato","aristotle","kant","hegel","beauvoir","heidegger","nietzsche","husserl"]);
const nodeG = root.append("g");
const nodes = nodeG.selectAll("g").data(P).join("g")
  .attr("class","philosopher")
  .on("click",(ev,d)=>{ ev.stopPropagation(); select(d); });

nodes.append("circle")
  .attr("r", d => KEY.has(d.id) ? 21 : 17)
  .attr("fill", d => (T[d.tradition]?.c || "#888") + "18")
  .attr("stroke", d => T[d.tradition]?.c || "#888");

nodes.append("text").attr("class","phil-name").attr("dy","0.35em").attr("y",-1)
  .text(d => { const p = d.name.trim().split(/\s+/); return p[p.length-1]; });

nodes.append("text").attr("class","phil-birth")
  .attr("y", d => (KEY.has(d.id) ? 21 : 17) + 10)
  .text(d => d.years.replace("c. ","").split("–")[0].replace(" BCE"," bc"));

// ─── RENDER ──────────────────────────────────────────────────────────────────
function curve(d) {
  const sx=d.source.x, sy=d.source.y, tx=d.target.x, ty=d.target.y;
  const mx=(sx+tx)/2;
  return `M${sx},${sy} C${mx},${sy} ${mx},${ty} ${tx},${ty}`;
}

function render() {
  linkSel.attr("d", curve);
  elabels.attr("x",d=>(d.source.x+d.target.x)/2).attr("y",d=>(d.source.y+d.target.y)/2-4);
  nodes.attr("transform",d=>`translate(${d.x},${d.y})`);
}

// ─── SELECTION ───────────────────────────────────────────────────────────────
svg.on("click", () => {
  clearSel();
  document.getElementById("sidebar").innerHTML = `<div id="ph">Select a philosopher to see their key concepts and intellectual genealogy.</div>`;
});

function select(phil) {
  const conn = new Set([phil.id]);
  const connLinks = new Set();
  links.forEach((d,i) => {
    if (d.source.id===phil.id||d.target.id===phil.id) {
      conn.add(d.source.id); conn.add(d.target.id); connLinks.add(i);
    }
  });
  nodes.select("circle")
    .attr("fill", d => (T[d.tradition]?.c||"#888") + (conn.has(d.id)?"38":"0a"))
    .attr("stroke-opacity", d => conn.has(d.id) ? 1 : .18);
  nodes.select(".phil-name").attr("fill-opacity", d => conn.has(d.id) ? 1 : .2);
  nodes.select(".phil-birth").attr("fill-opacity", d => conn.has(d.id) ? 1 : .1);
  linkSel
    .attr("class",(d,i)=>connLinks.has(i)?"influence-path hi":"influence-path fade")
    .attr("stroke-opacity",(d,i)=>connLinks.has(i)?.9:.04);
  elabels.attr("class",(d,i)=>connLinks.has(i)?"edge-label show":"edge-label");
  renderSidebar(phil);
}

function clearSel() {
  nodes.select("circle")
    .attr("fill",d=>(T[d.tradition]?.c||"#888")+"18").attr("stroke-opacity",1);
  nodes.select(".phil-name").attr("fill-opacity",1);
  nodes.select(".phil-birth").attr("fill-opacity",1);
  linkSel.attr("class","influence-path").attr("stroke-opacity",.32);
  elabels.attr("class","edge-label");
}

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────
function renderSidebar(phil) {
  const tr = T[phil.tradition]||{c:"#888",bg:"#222"};
  const inc = links.filter(d=>d.target.id===phil.id);
  const out = links.filter(d=>d.source.id===phil.id);
  const inH = inc.length
    ? inc.map(d=>`<div class="inf-item"><strong>${d.source.name}</strong>${d.concept}<em>${d.detail}</em></div>`).join("")
    : `<div style="color:#282838;font-size:.7rem;font-style:italic">None tracked in this graph.</div>`;
  const outH = out.length
    ? out.map(d=>`<div class="inf-item"><strong>${d.target.name}</strong>${d.concept}<em>${d.detail}</em></div>`).join("")
    : `<div style="color:#282838;font-size:.7rem;font-style:italic">None tracked in this graph.</div>`;
  document.getElementById("sidebar").innerHTML = `
    <span class="s-trad" style="background:${tr.bg};color:${tr.c}">${phil.tradition}</span>
    <div class="s-name">${phil.name}</div>
    <div class="s-years">${phil.years}</div>
    <div class="s-bio">${phil.bio}</div>
    <div class="s-h">Key Concepts</div>
    ${phil.concepts.map(c=>`<div class="concept">${c}</div>`).join("")}
    <div class="s-h">Influenced by</div>${inH}
    <div class="s-h">Influenced</div>${outH}
  `;
}

// ─── LEGEND ──────────────────────────────────────────────────────────────────
const leg = document.getElementById("legend");
Object.entries(T).forEach(([name,{c}]) => {
  leg.insertAdjacentHTML("beforeend",
    `<div class="li"><div class="ld" style="background:${c}"></div><span>${name}</span></div>`);
});

// ─── RESIZE ──────────────────────────────────────────────────────────────────
window.addEventListener("resize", () => {
  W = cont.clientWidth; H = cont.clientHeight;
  drawBands();
  computePositions();
  render();
});

drawBands();
computePositions();
render();
</script>
</body>
</html>
